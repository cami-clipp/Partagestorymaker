<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partage Story Maker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f5f0eb;color:#1a0f0a;display:flex;height:100vh;overflow:hidden;}

/* ── PANEL ── */
#panel{
  width:320px;min-width:320px;
  background:#fff;
  border-right:1px solid #e8ddd5;
  padding:0;
  overflow-y:auto;
  display:flex;flex-direction:column;
  box-shadow:2px 0 20px rgba(0,0,0,0.06);
}
.panel-header{
  background:#fff;
  padding:22px 20px 16px;
  border-bottom:1px solid #f0e8e0;
  position:sticky;top:0;z-index:10;
}
.app-title{font-size:13px;font-weight:900;color:#D4784A;letter-spacing:3px;}
.app-sub{font-size:9px;color:#b09080;letter-spacing:1px;margin-top:2px;}
.panel-body{padding:0;display:flex;flex-direction:column;}

.sec-block{padding:18px 20px;border-bottom:1px solid #f0e8e0;}
.sec{font-size:8px;font-weight:800;color:#D4784A;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.sec::after{content:'';flex:1;height:1px;background:#f0e8e0;}
.lbl{font-size:9px;color:#9a8070;font-weight:600;display:block;margin-bottom:4px;letter-spacing:.5px;}
input[type=text]{
  width:100%;
  background:#faf6f3;
  border:1.5px solid #e8ddd5;
  border-radius:8px;
  padding:9px 12px;
  color:#1a0f0a;
  font-family:'Montserrat',sans-serif;
  font-size:11px;
  font-weight:500;
  outline:none;
  transition:.15s;
}
input[type=text]:focus{border-color:#D4784A;background:#fff;}
input[type=range]{width:100%;accent-color:#D4784A;cursor:pointer;height:3px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mb{margin-bottom:10px;}
.sep{display:none;}

.foto-drop{
  border:2px dashed #e0d0c4;
  border-radius:10px;
  padding:16px;
  text-align:center;
  cursor:pointer;
  font-size:10px;
  color:#b09080;
  transition:.2s;
  background:#faf6f3;
}
.foto-drop:hover{border-color:#D4784A;color:#D4784A;background:#fff8f5;}
.foto-drop.has{border-color:#D4784A;color:#D4784A;background:#fff8f5;}
#foto-input{display:none;}

.logo-tabs{display:flex;border-radius:8px;overflow:hidden;border:1.5px solid #e8ddd5;background:#faf6f3;}
.logo-tab{flex:1;text-align:center;padding:8px 2px;font-size:9px;font-weight:700;cursor:pointer;color:#b09080;transition:.2s;letter-spacing:.5px;}
.logo-tab.active{background:#D4784A;color:#fff;}

.check-row{display:flex;align-items:center;gap:8px;font-size:10px;color:#7a6050;cursor:pointer;font-weight:500;}
.check-row input{accent-color:#D4784A;}

.oval-item{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.oval-item input{flex:1;background:#faf6f3;border:1.5px solid #e8ddd5;border-radius:8px;padding:9px 12px;color:#1a0f0a;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;outline:none;transition:.15s;}
.oval-item input:focus{border-color:#D4784A;background:#fff;}
.btn-x{background:#fff0ee;border:1px solid #ffd5cc;color:#D4784A;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;flex-shrink:0;line-height:1;font-weight:700;}
.btn-x:hover{background:#ffe0d8;}
.btn-add{
  width:100%;
  background:#fff;
  border:1.5px dashed #e0c8b8;
  color:#D4784A;
  border-radius:8px;
  padding:9px;
  font-size:10px;
  font-weight:700;
  cursor:pointer;
  font-family:'Montserrat',sans-serif;
  margin-bottom:6px;
  letter-spacing:.5px;
  transition:.2s;
}
.btn-add:hover{background:#fff8f5;border-color:#D4784A;}

.panel-footer{padding:18px 20px;background:#fff;border-top:1px solid #f0e8e0;position:sticky;bottom:0;}
.btn-gen{
  background:linear-gradient(135deg,#D4784A,#c06030);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:14px;
  font-family:'Montserrat',sans-serif;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
  width:100%;
  letter-spacing:2px;
  text-transform:uppercase;
  box-shadow:0 4px 16px rgba(212,120,74,0.35);
  transition:.2s;
}
.btn-gen:hover{box-shadow:0 6px 20px rgba(212,120,74,0.5);transform:translateY(-1px);}
#status{font-size:10px;text-align:center;color:#b09080;min-height:14px;margin-bottom:8px;font-weight:500;}

/* ── PREVIEW ── */
#preview-area{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#ede6df;
  padding:20px;gap:12px;
  overflow:hidden;
  background-image:radial-gradient(circle, #e0d5cc 1px, transparent 1px);
  background-size:24px 24px;
}
.zoom-bar{display:flex;align-items:center;gap:10px;background:#fff;border-radius:8px;padding:6px 12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.zoom-bar button{background:none;color:#D4784A;border:none;width:24px;height:24px;font-size:16px;cursor:pointer;font-weight:700;line-height:1;}
.zoom-bar span{font-size:10px;color:#9a8070;font-weight:700;min-width:35px;text-align:center;}
.hint{font-size:9px;color:#b0a090;font-weight:500;letter-spacing:.5px;}
#preview-wrap{position:relative;border-radius:4px;overflow:hidden;box-shadow:0 16px 60px rgba(0,0,0,0.25);}

@media(max-width:700px){
  body{flex-direction:column;height:auto;overflow:auto;}
  #panel{width:100%;min-width:unset;order:2;}
  #preview-area{order:1;padding:10px;min-height:60vw;background-image:none;}
  .zoom-bar{display:none;}
  .hint{display:none;}
}

#story{width:1080px;height:1920px;position:relative;overflow:hidden;font-family:'Montserrat',Arial,sans-serif;background:#222;transform-origin:top left;user-select:none;}
#bg-wrap{position:absolute;inset:0;overflow:hidden;z-index:1;}
#bg-img{width:100%;height:100%;background-size:cover;background-repeat:no-repeat;background-position:50% 45%;filter:brightness(1.18) contrast(1.05) saturate(1.1);transform-origin:center;}
.grad{position:absolute;inset:0;pointer-events:none;z-index:2;transition:background .3s;}
.grad-naranja{background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,0) 45%,rgba(196,98,45,.28) 72%,rgba(196,98,45,.55) 100%);}
.grad-sin{background:none;}

.el{position:absolute;cursor:grab;z-index:10;}
.el:active{cursor:grabbing;}
.el.sel{outline:2px dashed rgba(200,169,122,.7);outline-offset:4px;}

.t-logo img{height:220px;display:block;}
.t-badge span{display:block;background:#D4784A;border-radius:6px;padding:10px 40px;font-size:28px;font-weight:700;color:#fff;letter-spacing:4px;text-transform:uppercase;white-space:nowrap;}
.t-dest1{font-size:148px;font-weight:900;color:#fff;line-height:.85;letter-spacing:-4px;text-transform:uppercase;text-shadow:0 4px 28px rgba(0,0,0,.5);text-align:center;white-space:nowrap;}
.t-dest2wrap{background:#F5C542;border-radius:12px;padding:14px 60px 16px;display:inline-block;}
.t-dest2{font-size:100px;font-weight:800;color:#D4784A;letter-spacing:2px;text-transform:uppercase;line-height:1;white-space:nowrap;}
.t-fecha{text-align:center;}
.t-fecha .fd{font-size:66px;font-weight:300;color:#fff;text-shadow:0 3px 16px rgba(0,0,0,.7);}
.t-fecha .fm{font-weight:900;color:#F5C542;}
.t-fecha .fs{font-size:36px;font-weight:400;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.7);margin-top:8px;}
.t-fecha .fc{color:#D4784A;font-weight:700;}
.t-oval{width:510px;height:128px;border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.t-oval p{font-size:32px;color:#fff;font-weight:600;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,.7);padding:0 36px;pointer-events:none;white-space:pre-line;}
.t-text{font-size:36px;font-weight:600;color:#fff;text-align:center;text-shadow:0 2px 12px rgba(0,0,0,.8);padding:0 20px;white-space:nowrap;}
.t-cupos p{font-size:26px;color:rgba(255,255,255,.7);letter-spacing:4px;text-transform:uppercase;text-shadow:0 2px 8px rgba(0,0,0,.7);}
</style>
</head>
<body>

<div id="panel">
  <div class="panel-header">
    <div class="app-title">PARTAGE STORY MAKER</div>
    <div class="app-sub">STORIES PARA INSTAGRAM · 1080×1920</div>
  </div>
  <div class="panel-body">

    <div class="sec-block">
      <div class="sec">Destino</div>
      <div class="mb"><label class="lbl">Destino principal</label><input type="text" id="dest1" placeholder="USHUAIA"></div>
      <div class="mb"><label class="lbl">Tamaño <span id="dest1-size-val">148px</span></label><input type="range" id="dest1-size" min="40" max="200" value="148"></div>
      <div class="mb"><label class="lbl">Segundo destino (opcional)</label><input type="text" id="dest2" placeholder="+ EL CALAFATE"></div>
      <div class="mb"><label class="lbl">Badge naranja</label><input type="text" id="badge" placeholder="VIAJE GRUPAL"></div>
      <div class="mb"><label class="lbl">Tamaño badge <span id="badge-size-val">28px</span></label><input type="range" id="badge-size" min="14" max="60" value="28"></div>
      <div><label class="lbl">Tamaño segundo destino <span id="dest2-size-val">100px</span></label><input type="range" id="dest2-size" min="30" max="120" value="100"></div>
    </div>

    <div class="sec-block">
      <div class="sec">Fecha y salida</div>
      <div class="row2 mb">
        <div><label class="lbl">Día</label><input type="text" id="dia" placeholder="17"></div>
        <div><label class="lbl">Mes</label><input type="text" id="mes" placeholder="Octubre"></div>
      </div>
      <div class="mb"><label class="lbl">Ciudad de salida</label><input type="text" id="salida" placeholder="Rosario"></div>
      <div class="mb"><label class="lbl">Tamaño fecha <span id="fecha-size-val">66px</span></label><input type="range" id="fecha-size" min="30" max="100" value="66"></div>
      <div><label class="lbl">Tamaño ciudad <span id="salida-size-val">36px</span></label><input type="range" id="salida-size" min="16" max="60" value="36"></div>
    </div>

    <div class="sec-block">
      <div class="sec">Foto de fondo</div>
      <div class="foto-drop" id="foto-drop"><div id="foto-label">Clic o arrastrá la foto<br><span style="font-size:9px;opacity:.7">.jpg · .jpeg · .png</span></div></div>
      <input id="foto-input" type="file" accept="image/*">
      <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px;">
        <div><label class="lbl">Zoom foto <span id="zoom-foto-val">100%</span></label><input type="range" id="foto-zoom" min="100" max="300" value="100"></div>
        <div><label class="lbl">Posición horizontal</label><input type="range" id="foto-x" min="0" max="100" value="50"></div>
        <div><label class="lbl">Posición vertical</label><input type="range" id="foto-y" min="0" max="100" value="45"></div>
      </div>
      <div style="margin-top:12px;">
        <label class="lbl">Overlay de foto</label>
        <div class="logo-tabs" style="margin-top:4px;">
          <div class="logo-tab active" id="tab-naranja" onclick="setOverlay('naranja')">Naranja</div>
          <div class="logo-tab" id="tab-sin-overlay" onclick="setOverlay('sin')">Sin overlay</div>
        </div>
      </div>
    </div>

    <div class="sec-block">
      <div class="sec">Óvalos y textos</div>
      <div id="oval-list"></div>
      <button class="btn-add" onclick="addOval()">+ Agregar óvalo con info</button>
      <button class="btn-add" onclick="addText()">+ Agregar texto libre</button>
      <div style="margin-top:4px"><label class="lbl">Tamaño texto óvalos <span id="oval-size-val">32px</span></label><input type="range" id="oval-size" min="14" max="60" value="32"></div>
    </div>

    <div class="sec-block">
      <div class="sec">Opcionales</div>
      <div class="mb"><label class="lbl">Logo</label>
        <div class="logo-tabs">
          <div class="logo-tab active" id="tab-color" onclick="setLogo('color')">Color</div>
          <div class="logo-tab" id="tab-blanco" onclick="setLogo('blanco')">Blanco</div>
          <div class="logo-tab" id="tab-oculto" onclick="setLogo('oculto')">Sin logo</div>
        </div>
      </div>
      <label class="check-row"><input type="checkbox" id="show-cupos" checked onchange="updateFixed()"> Mostrar "Cupos limitados"</label>
    </div>

  </div>
  <div class="panel-footer">
    <div id="status"></div>
    <button class="btn-gen" onclick="genPNG()">Generar y descargar</button>
  </div>
</div>

<div id="preview-area">
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="zoom-bar">
      <button onclick="zoomCanvas(-0.05)">−</button>
      <span id="zoom-lbl">30%</span>
      <button onclick="zoomCanvas(+0.05)">+</button>
    </div>
    <div class="hint">Arrastrá cualquier elemento para reposicionarlo</div>
  </div>
  <div id="preview-wrap">
    <div id="story">
      <div id="bg-wrap"><div id="bg-img"></div></div>
      <div class="grad grad-naranja" id="grad-el"></div><div id="guides" style="position:absolute;inset:0;z-index:20;pointer-events:none;">
  <!-- centro vertical -->
  <div style="position:absolute;left:50%;top:0;bottom:0;width:0;border-left:1px dashed rgba(200,169,122,0.5);"></div>
  <!-- centro horizontal -->
  <div style="position:absolute;top:50%;left:0;right:0;height:0;border-top:1px dashed rgba(200,169,122,0.5);"></div>
  <!-- tercio superior -->
  <div style="position:absolute;top:33.3%;left:0;right:0;height:0;border-top:1px dashed rgba(255,255,255,0.15);"></div>
  <!-- tercio inferior -->
  <div style="position:absolute;top:66.6%;left:0;right:0;height:0;border-top:1px dashed rgba(255,255,255,0.15);"></div>
</div>
    </div>
  </div>
</div>

  canvasScale = Math.min(.55, Math.max(.12, canvasScale+d));
  applyCanvasScale();
}
function applyCanvasScale(){
  const s = document.getElementById('story');
  const w = document.getElementById('preview-wrap');
  s.style.transform = 'scale('+canvasScale+')';
  w.style.width  = (1080*canvasScale)+'px';
  w.style.height = (1920*canvasScale)+'px';
  document.getElementById('zoom-lbl').textContent = Math.round(canvasScale*100)+'%';
}
function autoFitCanvas(){
  if(window.innerWidth <= 700){
    const available = window.innerWidth - 20;
    canvasScale = available / 1080;
    applyCanvasScale();
  }
}
applyCanvasScale();
autoFitCanvas();
window.addEventListener('resize', autoFitCanvas);

// ── Foto ──
document.getElementById('foto-input').onchange = function(){ if(this.files[0]) loadFoto(this.files[0]); };
const fotoDrop = document.getElementById('foto-drop');
fotoDrop.onclick = () => document.getElementById('foto-input').click();
fotoDrop.ondragover = e => { e.preventDefault(); fotoDrop.style.borderColor='#C8A97A'; };
fotoDrop.ondragleave = () => fotoDrop.style.borderColor='';
fotoDrop.ondrop = e => { e.preventDefault(); fotoDrop.style.borderColor=''; if(e.dataTransfer.files[0]) loadFoto(e.dataTransfer.files[0]); };

function loadFoto(file){
  const r = new FileReader();
  r.onload = e => {
    const img = document.getElementById('bg-img');
    img.style.backgroundImage = 'url('+e.target.result+')';
    fotoDrop.classList.add('has');
    document.getElementById('foto-label').textContent = '✓ '+file.name;
    updateFoto();
  };
  r.readAsDataURL(file);
}
function updateFoto(){
  const img = document.getElementById('bg-img');
  const z = document.getElementById('foto-zoom').value;
  const x = document.getElementById('foto-x').value;
  const y = document.getElementById('foto-y').value;
  document.getElementById('zoom-foto-val').textContent = z+'%';
  img.style.backgroundSize = z+'%';
  img.style.backgroundPosition = x+'% '+y+'%';
}
['foto-zoom','foto-x','foto-y'].forEach(id => document.getElementById(id).addEventListener('input', updateFoto));

// ── Drag (mouse + touch) ──
function getClientXY(e){
  if(e.touches) return {x: e.touches[0].clientX, y: e.touches[0].clientY};
  return {x: e.clientX, y: e.clientY};
}
function startDrag(el, e){
  e.preventDefault();
  const sr = document.getElementById('story').getBoundingClientRect();
  const er = el.getBoundingClientRect();
  const curLeft = (er.left - sr.left) / canvasScale;
  const curTop  = (er.top  - sr.top)  / canvasScale;
  el.style.transform = '';
  el.style.left  = curLeft+'px';
  el.style.top   = curTop+'px';
  el.style.right = '';
  const {x,y} = getClientXY(e);
  dragging = {el, ox:x, oy:y, sl:curLeft, st:curTop};
  el.classList.add('sel');
}
function moveDrag(e){
  if(!dragging) return;
  const {x,y} = getClientXY(e);
  const dx = (x - dragging.ox) / canvasScale;
  const dy = (y - dragging.oy) / canvasScale;
  let newLeft = Math.max(0, dragging.sl+dx);
  const newTop  = Math.max(0, dragging.st+dy);
  const elW = dragging.el.offsetWidth;
  const elCenter = newLeft + elW/2;
  const vLine = document.querySelector('#guides div:nth-child(1)');
  if(Math.abs(elCenter - 540) < 18){
    newLeft = 540 - elW/2;
    if(vLine) vLine.style.borderColor = 'rgba(212,120,74,0.9)';
  } else {
    if(vLine) vLine.style.borderColor = 'rgba(200,169,122,0.5)';
  }
  dragging.el.style.left = newLeft+'px';
  dragging.el.style.top  = newTop+'px';
}
function endDrag(){
  if(dragging){ dragging.el.classList.remove('sel'); dragging=null; }
}
function makeDraggable(el){
  el.addEventListener('mousedown', e => startDrag(el, e));
  el.addEventListener('touchstart', e => startDrag(el, e), {passive:false});
}
const SNAP_DIST = 18;
document.addEventListener('mousemove', moveDrag);
document.addEventListener('touchmove', moveDrag, {passive:false});
document.addEventListener('mouseup', endDrag);
document.addEventListener('touchend', endDrag);

// ── Crear elemento fijo ──
function mkEl(cls, html, left, top, extraStyle){
  const d = document.createElement('div');
  d.className = 'el ' + cls;
  d.innerHTML = html;
  if(left === 'center'){
    d.style.left = '50%';
    d.style.transform = 'translateX(-50%)';
  } else {
    d.style.left = left+'px';
  }
  d.style.top = top+'px';
  if(extraStyle) Object.assign(d.style, extraStyle);
  document.getElementById('story').appendChild(d);
  makeDraggable(d);
  return d;
}

  const dest2Size = document.getElementById('dest2-size').value;
  document.getElementById('dest2-size-val').textContent = dest2Size+'px';
  const d2val = document.getElementById('dest2').value.trim();
  const d2el  = document.getElementById('el-dest2');
  const s2    = document.getElementById('s-dest2');
  if(d2el){ d2el.style.display = d2val ? 'block' : 'none'; }
  if(s2 && d2val){ s2.textContent = d2val.toUpperCase(); s2.style.fontSize = dest2Size+'px'; }

  const badgeSize = document.getElementById('badge-size').value;
  document.getElementById('badge-size-val').textContent = badgeSize+'px';
  const b = document.getElementById('badge').value.trim() || 'VIAJE GRUPAL';
  const sb = document.getElementById('s-badge');
  if(sb){ sb.textContent = b.toUpperCase(); sb.style.fontSize = badgeSize+'px'; }

  const dia = document.getElementById('dia').value.trim() || '17';
  const mes = document.getElementById('mes').value.trim() || 'Octubre';
  const sal = document.getElementById('salida').value.trim();
  const fechaSize = document.getElementById('fecha-size').value;
  const salidaSize = document.getElementById('salida-size').value;
  document.getElementById('fecha-size-val').textContent = fechaSize+'px';
  document.getElementById('salida-size-val').textContent = salidaSize+'px';
  const tf = document.querySelector('.t-fecha');
  if(tf) tf.innerHTML =
    '<div class="fd" style="font-size:'+fechaSize+'px">'+dia+' de <span class="fm">'+mes+'</span></div>' +
    (sal ? '<div class="fs" style="font-size:'+salidaSize+'px">desde <span class="fc">'+sal+'</span></div>' : '');

  const cupos = document.getElementById('el-cupos');
  if(cupos) cupos.style.display = document.getElementById('show-cupos').checked ? 'block' : 'none';

  const logoEl  = document.querySelector('.t-logo');
  const logoImg = document.getElementById('logo-img');

  if(logoImg) logoImg.style.filter  = logoMode==='blanco' ? 'brightness(0) invert(1)' : '';

// ── Óvalos dinámicos ──
function addOval(textoDefault){
  const idx = dynElements.length;
  if(idx >= 5) return;
  const id = 'dyn-'+(eid++);
  const pos = OVAL_DEFAULTS[idx];

  const domEl = document.createElement('div');
  domEl.className = 'el t-oval';
  domEl.id = id;
  domEl.style.top = pos.top+'px';
  if(pos.left !== null){ domEl.style.left = pos.left+'px'; }
  else { domEl.style.right = pos.right+'px'; domEl.style.left='auto'; }
  const p = document.createElement('p');
  domEl.appendChild(p);
  document.getElementById('story').appendChild(domEl);
  makeDraggable(domEl);

  // Panel row
  const row = document.createElement('div');
  row.className = 'oval-item';
  row.id = 'row-'+id;
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = 'Texto del óvalo (Shift+Enter = nueva línea)';
  if(textoDefault){ inp.value = textoDefault; p.textContent = textoDefault; }
  inp.oninput = () => { p.innerHTML = inp.value.replace(/\n/g,'<br>'); };
  inp.addEventListener('keydown', e => { if(e.key==='Enter' && e.shiftKey){ e.preventDefault(); const pos=inp.selectionStart; inp.value=inp.value.slice(0,pos)+'\n'+inp.value.slice(pos); inp.selectionStart=inp.selectionEnd=pos+1; inp.dispatchEvent(new Event('input')); } });
  const btn = document.createElement('button');
  btn.className = 'btn-x'; btn.textContent = '×';
  btn.onclick = () => { domEl.remove(); row.remove(); dynElements = dynElements.filter(e=>e.id!==id); };
  row.appendChild(inp); row.appendChild(btn);
  document.getElementById('oval-list').appendChild(row);

  dynElements.push({id, domEl, panelEl:row});
  if(textoDefault){ inp.focus(); inp.blur(); }
}

function addText(){
  const id = 'dyn-'+(eid++);
  const domEl = document.createElement('div');
  domEl.className = 'el t-text';
  domEl.id = id;
  domEl.style.left = '200px';
  domEl.style.top  = '900px';
  domEl.textContent = '';
  document.getElementById('story').appendChild(domEl);
  makeDraggable(domEl);

  const row = document.createElement('div');
  row.className = 'oval-item';
  row.id = 'row-'+id;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.placeholder = 'Texto libre';
  inp.oninput = () => { domEl.innerHTML = inp.value.replace(/\n/g,'<br>'); };
  inp.addEventListener('keydown', e => { if(e.key==='Enter' && e.shiftKey){ e.preventDefault(); const pos=inp.selectionStart; inp.value=inp.value.slice(0,pos)+'\n'+inp.value.slice(pos); inp.selectionStart=inp.selectionEnd=pos+1; inp.dispatchEvent(new Event('input')); } });
  const btn = document.createElement('button');
  btn.className = 'btn-x'; btn.textContent = '×';
  btn.onclick = () => { domEl.remove(); row.remove(); dynElements = dynElements.filter(e=>e.id!==id); };
  row.appendChild(inp); row.appendChild(btn);
  document.getElementById('oval-list').appendChild(row);
  dynElements.push({id, domEl, panelEl:row});
  inp.focus();
}

// ── Generar PNG ──
async function genPNG(){
  const bg = document.getElementById('bg-img');
  if(!bg.style.backgroundImage){ setStatus('⚠️ Primero elegí una foto.','#f44336'); return; }
  setStatus('⏳ Generando...','#C8A97A');
  const story = document.getElementById('story');
  document.getElementById('guides').style.display='none';
  story.style.transform = 'scale(1)';
  await new Promise(r=>setTimeout(r,150));
  try{
    const canvas = await html2canvas(story,{width:1080,height:1920,scale:1,useCORS:true,allowTaint:true,logging:false});
    const a = document.createElement('a');
    a.download = 'partage_story_'+(document.getElementById('dest1').value.trim()||'story').toLowerCase().replace(/\s+/g,'_')+'.png';
    a.href = canvas.toDataURL('image/png'); a.click();
    setStatus('✅ ¡Descargada!','#4CAF50');
  } catch(e){ setStatus('❌ '+e.message,'#f44336'); }
  applyCanvasScale();
  document.getElementById('guides').style.display='block';
}
function setStatus(m,c){ const e=document.getElementById('status'); e.textContent=m; e.style.color=c; }
